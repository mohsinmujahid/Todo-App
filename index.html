<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="todo-container">
        <header>
            <div>
                <h1>Todo App</h1>
                <p>Manage your daily tasks professionally</p>
            </div>

            <button id="themeBtn" class="theme-button">🌙</button>
        </header>

        <form id="taskForm" class="task-form">
            <input type="text" id="taskInput" placeholder="Enter your task..." required />
            <button type="submit">Add Task</button>
        </form>

        <div class="task-stats">
            <div class="pending-box">
                Pending: <span id="pendingTasks">0</span>
            </div>
            <div class="completed-box">
                Completed: <span id="completedTasks">0</span>
            </div>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <p id="emptyText" class="empty-text">No tasks added yet.</p>
    </div>

    <!-- Edit Task Popup -->
    <div id="editPopup" class="popup">
        <div class="popup-content">
            <h2>Edit Task</h2>
            <input type="text" id="editTaskInput" />
            <div class="popup-buttons">
                <button id="closeEdit" class="cancel-button">Cancel</button>
                <button id="updateTask" class="save-button">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
